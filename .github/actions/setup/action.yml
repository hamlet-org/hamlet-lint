name: Set up hamlet-lint toolchain
description: >
  Sets up OCaml, installs hamlet (via git pin or opam), and installs the
  linter's opam deps. Checkout is caller-owned because ci and release
  want different refs and fetch depths.

inputs:
  ocaml-compiler:
    description: OCaml compiler version passed to ocaml/setup-ocaml
    required: true
  hamlet-source:
    description: "How to obtain hamlet: 'git' (bootstrap pin) or 'opam' (steady state)"
    required: true
  hamlet-version:
    description: Hamlet version for the opam branch; ignored when hamlet-source=git
    required: false
    default: ""
  hamlet-git-url:
    description: Git URL for the git branch; ignored when hamlet-source=opam
    required: false
    default: https://github.com/hamlet-org/hamlet.git
  hamlet-git-ref:
    description: Git ref for the git branch; ignored when hamlet-source=opam
    required: false
    default: main
  with-test:
    description: "Install [with-test] deps (alcotest etc.). Default: true."
    required: false
    default: "true"
  with-doc:
    description: "Install [with-doc] deps (odoc etc.). Default: false — only the lint-doc job needs them."
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: ocaml/setup-ocaml@v3
      with:
        ocaml-compiler: ${{ inputs.ocaml-compiler }}

    - name: Install hamlet (bootstrap / git pin)
      if: inputs.hamlet-source == 'git'
      shell: bash
      run: |
        opam pin add -y --no-action hamlet "${{ inputs.hamlet-git-url }}#${{ inputs.hamlet-git-ref }}"
        opam pin add -y --no-action ppx_hamlet "${{ inputs.hamlet-git-url }}#${{ inputs.hamlet-git-ref }}"
        opam install -y hamlet ppx_hamlet

    - name: Install hamlet (steady state / opam)
      if: inputs.hamlet-source == 'opam'
      shell: bash
      run: opam install -y "hamlet.${{ inputs.hamlet-version }}" "ppx_hamlet.${{ inputs.hamlet-version }}"

    # Build the deps-install flag string. Each opt-in flag adds its
    # transitive deps; omitting them skips the corresponding sub-tree
    # (e.g. odoc + its deps when with-doc=false). Saves macOS minutes
    # in jobs that don't run @doc / @runtest.
    - name: Install linter deps
      shell: bash
      env:
        WITH_TEST: ${{ inputs.with-test }}
        WITH_DOC: ${{ inputs.with-doc }}
      run: |
        flags=""
        [ "$WITH_TEST" = "true" ] && flags="$flags --with-test"
        [ "$WITH_DOC" = "true" ]  && flags="$flags --with-doc"
        opam install . --deps-only $flags -y
