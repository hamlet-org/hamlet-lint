name: ci

on:
  push:
    branches: [main]
    # Docs-only / metadata-only changes don't affect build or tests.
    # Skip CI for them to save runner minutes. `knowledge/` is the
    # local knowledge base (git-ignored in this repo, but listed for
    # safety in case anyone tracks it in a fork).
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - "knowledge/**"
      - ".github/dependabot.yml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - "knowledge/**"
      - ".github/dependabot.yml"

# Auto-cancel superseded runs on the same branch/PR. On main we let
# every push complete so individual commits remain independently
# buildable; on PRs only the latest push is run.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Jobs only get read access to the repo: they cannot post comments,
# create tags, push, etc. Reduces the blast radius if a third-party
# action is ever compromised.
permissions: read-all

# How the linter obtains hamlet for fixture compilation.
#
#   git  — bootstrap mode: pin hamlet via `opam pin add` from git.
#          Used until hamlet has had its first opam-repository release.
#          See SWITCH-TO-OPAM.md at repo root.
#   opam — steady state: install the matching hamlet version from opam.
#          Flip the default here, delete SWITCH-TO-OPAM.md, and remove
#          the HAMLET_GIT_* inputs below once hamlet is on opam.
env:
  HAMLET_SOURCE: git
  HAMLET_GIT_URL: https://github.com/hamlet-org/hamlet.git
  HAMLET_GIT_REF: main
  # The exact hamlet version this repo currently targets. Used by the
  # `opam` branch below and by release-time metadata. Bump in lockstep
  # with each hamlet release.
  HAMLET_VERSION: 0.1.0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # Pinned to the exact patch: extract/compat.cppo.ml asserts
        # OCAML_VERSION = 5.4.1 via #error. Bump here and in
        # dune-project together when the bound widens.
        ocaml-compiler: ["5.4.1"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          hamlet-source: ${{ env.HAMLET_SOURCE }}
          hamlet-version: ${{ env.HAMLET_VERSION }}
          hamlet-git-url: ${{ env.HAMLET_GIT_URL }}
          hamlet-git-ref: ${{ env.HAMLET_GIT_REF }}

      # ocamlformat is a dev-only tool: not in dune-project depends
      # (it would leak into the opam package's runtime deps). Pin to
      # the version in .ocamlformat so CI matches local dev.
      - name: Install ocamlformat
        run: opam install -y ocamlformat.0.29.0

      - name: Build
        run: opam exec -- dune build

      - name: Test
        run: opam exec -- dune runtest

      - name: Format & docs
        run: opam exec -- dune build @fmt @doc

      - name: opam lint
        run: opam lint hamlet-lint.opam
