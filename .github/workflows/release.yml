name: release

# Release workflow. One run = one release pass for N (hamlet, ocaml)
# pairs at once. Each pair still gets its own git tag and GitHub
# Release on this repo (lifecycle unchanged), but the opam-repository
# submission is bundled: one PR with N package directories, the shape
# the maintainers prefer (cf. dune.3.22.2's 18-package PR).
#
# Typically dispatched by release/run.sh, which builds the JSON pairs
# input from missing pairs (skipping anything already merged or in an
# open PR upstream). Manual Run Workflow from the Actions UI works too:
# paste a JSON array as the `pairs` input.
on:
  workflow_dispatch:
    inputs:
      pairs:
        description: 'JSON array of pairs, e.g. [{"hamlet":"0.1.0","ocaml":"5.4.1"}]'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # Re-filter the input list against the current state of opam-repository
  # so a stale dispatch (manual UI typo, racing run.sh, etc.) self-corrects.
  # Outputs the filtered JSON as `pairs`, plus a count for the gating
  # `if:` on downstream jobs (matrix cannot be empty).
  plan:
    runs-on: ubuntu-latest
    outputs:
      pairs: ${{ steps.filter.outputs.pairs }}
      count: ${{ steps.filter.outputs.count }}
    steps:
      - name: Filter out already-published pairs
        id: filter
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAIRS_IN: ${{ inputs.pairs }}
        run: |
          out='[]'
          while read -r pair; do
            hamlet=$(jq -r '.hamlet' <<< "$pair")
            ocaml=$(jq -r '.ocaml' <<< "$pair")
            pkg="${hamlet}~${ocaml}"
            if gh api \
                 -H "Accept: application/vnd.github+json" \
                 "repos/ocaml/opam-repository/contents/packages/hamlet-lint/hamlet-lint.${pkg}" \
                 >/dev/null 2>&1; then
              echo "skip ${pkg}: already merged on ocaml/opam-repository"
            else
              echo "keep ${pkg}"
              out=$(jq -c --arg h "$hamlet" --arg o "$ocaml" \
                      '. + [{"hamlet":$h,"ocaml":$o}]' <<< "$out")
            fi
          done < <(jq -c '.[]' <<< "$PAIRS_IN")
          count=$(jq 'length' <<< "$out")
          echo "pairs=$out" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"

  # Per-pair build/test/tag/GitHub Release. Each matrix job mirrors the
  # old single-pair release job exactly, except the rendered opam file
  # is uploaded as an artifact instead of being PR'd inline. Tags and
  # Releases stay 1-per-pair (matches what we had before the bundling).
  build:
    needs: plan
    if: needs.plan.outputs.count != '0'
    strategy:
      fail-fast: false
      matrix:
        pair: ${{ fromJSON(needs.plan.outputs.pairs) }}
    runs-on: ubuntu-latest
    env:
      HAMLET_VERSION: ${{ matrix.pair.hamlet }}
      OCAML_TARGET: ${{ matrix.pair.ocaml }}
      # Opam package version uses the tilde convention for the
      # OCaml-target suffix (idiomatic on opam-repository, see
      # ppxlib.0.38.0~5.5preview for a precedent). The git tag MUST
      # use a hyphen instead, because git refs forbid `~` (see
      # git-check-ref-format(1)). Both forms derive from the same
      # two matrix fields.
      PKG_VERSION: ${{ matrix.pair.hamlet }}~${{ matrix.pair.ocaml }}
      TAG_NAME: v${{ matrix.pair.hamlet }}-${{ matrix.pair.ocaml }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: ./.github/actions/setup
        with:
          ocaml-compiler: ${{ matrix.pair.ocaml }}
          hamlet-source: opam
          hamlet-version: ${{ env.HAMLET_VERSION }}

      - name: Build & test
        run: |
          opam exec -- dune build
          opam exec -- dune runtest

      - name: Check tag state
        id: tag
        run: |
          git fetch --tags origin
          head_sha=$(git rev-parse HEAD)
          # dereference annotated tags (^{}) to get the underlying commit
          tag_commit=$(git ls-remote origin "refs/tags/${TAG_NAME}^{}" | awk '{print $1}')
          if [ -z "$tag_commit" ]; then
            tag_commit=$(git ls-remote origin "refs/tags/${TAG_NAME}" | awk '{print $1}')
          fi
          if [ -z "$tag_commit" ]; then
            echo "tag ${TAG_NAME} does not exist on origin, will create it"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          elif [ "$tag_commit" = "$head_sha" ]; then
            echo "tag ${TAG_NAME} already points to HEAD (${head_sha}), skipping creation"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            cat >&2 <<DIAG

          *** TAG CONFLICT ***

          The tag ${TAG_NAME} already exists on origin, but it points to
          a different commit than the one this workflow is running on.

            tag   → ${tag_commit}
            HEAD  → ${head_sha}

          Git tags are immutable once published. Moving a tag would break
          anyone who has already fetched the tarball, and opam lockfiles
          or CI caches that recorded the old checksum would silently get
          the wrong source.

          If you are re-running the same release:
            Delete the tag and its GitHub Release first, then re-run.

          If you are publishing a new version:
            Bump the version so a new tag is created instead.

          DIAG
            exit 1
          fi

      - name: Create git archive
        id: archive
        run: |
          rm -rf dist && mkdir -p dist
          TARBALL="dist/hamlet-lint-${PKG_VERSION}.tar.gz"
          git archive --format=tar.gz --prefix="hamlet-lint-${PKG_VERSION}/" \
            -o "$TARBALL" HEAD
          SHA=$(shasum -a 256 "$TARBALL" | awk '{print $1}')
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create annotated tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git tag -a "$TAG_NAME" -m "hamlet-lint ${PKG_VERSION}"
          git push origin "$TAG_NAME"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "GitHub Release ${TAG_NAME} already exists, skipping creation"
          else
            gh release create "$TAG_NAME" "${{ steps.archive.outputs.tarball }}" \
              --title "hamlet-lint ${PKG_VERSION}" \
              --notes "Packaging release for hamlet ${HAMLET_VERSION} on OCaml ${OCAML_TARGET}. See CHANGELOG.md for walker-level changes."
          fi
          TARBALL_URL=$(gh release view "$TAG_NAME" --json assets -q '.assets[0].url')
          echo "TARBALL_URL=$TARBALL_URL" >> "$GITHUB_ENV"

      - name: Render opam file
        run: |
          mkdir -p "rendered/${PKG_VERSION}"
          OPAM_OUT="rendered/${PKG_VERSION}/opam"
          sed \
            -e "s|%%VERSION%%|${PKG_VERSION}|g" \
            -e "s|%%HAMLET_VERSION%%|${HAMLET_VERSION}|g" \
            -e "s|%%OCAML_TARGET%%|${OCAML_TARGET}|g" \
            -e "s|%%TARBALL_URL%%|${TARBALL_URL}|g" \
            -e "s|%%CHECKSUM_SHA256%%|${{ steps.archive.outputs.sha256 }}|g" \
            release/hamlet-lint.opam.tmpl > "$OPAM_OUT"
          opam lint "$OPAM_OUT"

      # Artifact name encodes the pair so bundle-pr can pattern-download
      # all of them at once. `~` is allowed in artifact names.
      - name: Upload rendered opam
        uses: actions/upload-artifact@v4
        with:
          name: opam-${{ env.PKG_VERSION }}
          path: rendered/${{ env.PKG_VERSION }}/opam
          if-no-files-found: error

  # Bundle every rendered opam into a single PR against opam-repository.
  # Matches the house style for multi-package releases (one PR carrying
  # all the new package directories) and halves the reviewer click count
  # vs. the old one-PR-per-pair shape.
  bundle-pr:
    needs: [plan, build]
    if: needs.plan.outputs.count != '0'
    runs-on: ubuntu-latest
    steps:
      - name: Download all rendered opam files
        uses: actions/download-artifact@v4
        with:
          pattern: opam-*
          path: rendered
          merge-multiple: false

      - name: Open opam-repository PR
        env:
          GH_TOKEN: ${{ secrets.OPAM_REPO_PAT }}
          PAIRS: ${{ needs.plan.outputs.pairs }}
          COUNT: ${{ needs.plan.outputs.count }}
        run: |
          # Check for an existing PR before doing any work. Match on
          # "hamlet-lint" in the title among open PRs on the fork.
          existing=$(gh pr list \
            --repo ocaml/opam-repository \
            --search "[new release] hamlet-lint in:title" \
            --state open \
            --json number,title \
            --jq '.[] | select(.title | contains("hamlet-lint")) | .number' \
            | head -n1)
          if [ -n "$existing" ]; then
            echo "opam-repository PR #${existing} already open for hamlet-lint, skipping"
            exit 0
          fi

          WORKDIR=$(mktemp -d)
          gh repo clone ocaml/opam-repository "$WORKDIR" -- --depth=1
          cd "$WORKDIR"

          # Branch name is derived from the run id so two release passes
          # never clash on the fork. Hyphen only (git refs forbid ~).
          BRANCH_NAME="hamlet-lint-release-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"

          # Drop every rendered opam under its target package directory.
          # Each artifact landed at rendered/opam-<pair>/opam.
          versions=()
          for d in "${GITHUB_WORKSPACE}"/rendered/opam-*; do
            pkg="${d##*/opam-}"
            PKG_DIR="packages/hamlet-lint/hamlet-lint.${pkg}"
            mkdir -p "$PKG_DIR"
            cp "${d}/opam" "$PKG_DIR/opam"
            git add "$PKG_DIR/opam"
            versions+=("$pkg")
          done

          # Single-pair PRs keep the explicit form; multi-pair PRs use
          # the "(N packages)" form, matching dune/atd/ocurrent style.
          if [ "$COUNT" -eq 1 ]; then
            TITLE="[new release] hamlet-lint (${versions[0]})"
          else
            TITLE="[new release] hamlet-lint (${COUNT} packages)"
          fi

          # Body lists every pair so reviewers can see the full set
          # without expanding the diff.
          BODY="Automated release of hamlet-lint:"$'\n'
          for v in "${versions[@]}"; do
            BODY+="- hamlet-lint.${v}"$'\n'
          done

          git -c user.name="hamlet-lint release bot" \
              -c user.email="release@hamlet-lint" \
              commit -m "$TITLE"
          gh pr create \
            --repo ocaml/opam-repository \
            --title "$TITLE" \
            --body "$BODY"
