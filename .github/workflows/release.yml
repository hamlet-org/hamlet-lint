name: release

# Parameterised release job. One run = one published opam package for
# one (hamlet, ocaml) pair. Typically invoked via release/run.sh, which
# loops over missing pairs and skips anything already merged upstream.
# Manual Run Workflow from the Actions UI is still supported for
# one-offs, and is safe thanks to the guard job below.
on:
  workflow_dispatch:
    inputs:
      hamlet_version:
        description: "The hamlet version to target, e.g. 0.1.0"
        required: true
        type: string
      ocaml_target:
        description: "The exact OCaml patch, e.g. 5.4.1 (must be in OCAML_PATCHES in release/versions.sh)"
        required: true
        type: choice
        options: ["5.4.1"]

permissions:
  contents: write

jobs:
  # Second layer of idempotency on top of release/run.sh. If the package
  # is already merged on ocaml/opam-repository, skip the release job
  # entirely. This covers the case where someone triggers Run Workflow
  # from the UI bypassing the script, or where two invocations race.
  guard:
    runs-on: ubuntu-latest
    outputs:
      already: ${{ steps.check.outputs.already }}
    steps:
      - name: Check opam-repository for existing package
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pkg="${{ inputs.hamlet_version }}~${{ inputs.ocaml_target }}"
          if gh api \
               -H "Accept: application/vnd.github+json" \
               "repos/ocaml/opam-repository/contents/packages/hamlet-lint/hamlet-lint.${pkg}" \
               >/dev/null 2>&1; then
            echo "hamlet-lint.${pkg} is already merged on ocaml/opam-repository; skipping release."
            echo "already=true" >> "$GITHUB_OUTPUT"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: guard
    if: needs.guard.outputs.already != 'true'
    runs-on: ubuntu-latest
    env:
      HAMLET_VERSION: ${{ inputs.hamlet_version }}
      OCAML_TARGET: ${{ inputs.ocaml_target }}
      # Opam package version uses the tilde convention for the
      # OCaml-target suffix (idiomatic on opam-repository, see
      # ppxlib.0.38.0~5.5preview for a precedent). The git tag and
      # PR branch name MUST use a hyphen instead, because git refs
      # forbid `~` (see git-check-ref-format(1)). The two namespaces
      # are kept consistent by always deriving them from the same
      # two inputs.
      PKG_VERSION: ${{ inputs.hamlet_version }}~${{ inputs.ocaml_target }}
      TAG_NAME: v${{ inputs.hamlet_version }}-${{ inputs.ocaml_target }}
      BRANCH_NAME: hamlet-lint-${{ inputs.hamlet_version }}-${{ inputs.ocaml_target }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: ./.github/actions/setup
        with:
          ocaml-compiler: ${{ inputs.ocaml_target }}
          hamlet-source: opam
          hamlet-version: ${{ env.HAMLET_VERSION }}

      - name: Build & test
        run: |
          opam exec -- dune build
          opam exec -- dune runtest

      - name: Create git archive
        id: archive
        run: |
          mkdir -p dist
          TARBALL="dist/hamlet-lint-${PKG_VERSION}.tar.gz"
          git archive --format=tar.gz --prefix="hamlet-lint-${PKG_VERSION}/" \
            -o "$TARBALL" HEAD
          SHA=$(shasum -a 256 "$TARBALL" | awk '{print $1}')
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create annotated tag
        run: |
          git tag -a "$TAG_NAME" -m "hamlet-lint ${PKG_VERSION}"
          git push origin "$TAG_NAME"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG_NAME" "${{ steps.archive.outputs.tarball }}" \
            --title "hamlet-lint ${PKG_VERSION}" \
            --notes "Packaging release for hamlet ${HAMLET_VERSION} on OCaml ${OCAML_TARGET}. See CHANGELOG.md for walker-level changes."
          TARBALL_URL=$(gh release view "$TAG_NAME" --json assets -q '.assets[0].url')
          echo "TARBALL_URL=$TARBALL_URL" >> "$GITHUB_ENV"

      - name: Render opam file
        run: |
          mkdir -p rendered
          OPAM_OUT="rendered/opam"
          sed \
            -e "s|%%VERSION%%|${PKG_VERSION}|g" \
            -e "s|%%HAMLET_VERSION%%|${HAMLET_VERSION}|g" \
            -e "s|%%OCAML_TARGET%%|${OCAML_TARGET}|g" \
            -e "s|%%TARBALL_URL%%|${TARBALL_URL}|g" \
            -e "s|%%CHECKSUM_SHA256%%|${{ steps.archive.outputs.sha256 }}|g" \
            release/hamlet-lint.opam.tmpl > "$OPAM_OUT"
          opam lint "$OPAM_OUT"

      - name: Open opam-repository PR
        env:
          GH_TOKEN: ${{ secrets.OPAM_REPO_PAT }}
        run: |
          WORKDIR=$(mktemp -d)
          gh repo clone ocaml/opam-repository "$WORKDIR" -- --depth=1
          cd "$WORKDIR"
          git checkout -b "${BRANCH_NAME}"
          PKG_DIR="packages/hamlet-lint/hamlet-lint.${PKG_VERSION}"
          mkdir -p "$PKG_DIR"
          cp "${GITHUB_WORKSPACE}/rendered/opam" "$PKG_DIR/opam"
          git add "$PKG_DIR/opam"
          git -c user.name="hamlet-lint release bot" \
              -c user.email="release@hamlet-lint" \
              commit -m "[new release] hamlet-lint (${PKG_VERSION})"
          gh pr create \
            --repo ocaml/opam-repository \
            --title "[new release] hamlet-lint (${PKG_VERSION})" \
            --body "Automated release of hamlet-lint ${PKG_VERSION} (hamlet ${HAMLET_VERSION}, OCaml ${OCAML_TARGET})."
